<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color & Draw! 🎨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0621;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: white;
    overflow-x: hidden;
    user-select: none;
  }

  /* ── Top Bar ── */
  .topbar {
    background: rgba(255,255,255,0.06);
    border-bottom: 2px solid rgba(255,105,180,0.3);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    position: relative; z-index: 5;
  }
  .back-btn {
    text-decoration: none; color: #c8a8ff; font-size: 14px;
    background: rgba(255,255,255,0.08); padding: 6px 14px;
    border-radius: 20px; transition: background 0.2s; white-space: nowrap;
  }
  .back-btn:hover { background: rgba(255,255,255,0.16); }
  .topbar h1 { font-size: 20px; color: #ff69b4; margin-right: auto; }

  /* ── Scene Selector ── */
  .scene-bar {
    background: rgba(0,0,0,0.35);
    padding: 8px 14px;
    display: flex; gap: 8px; overflow-x: auto; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: relative; z-index: 5;
  }
  .scene-bar span { font-size: 12px; color: #9070b0; white-space: nowrap; margin-right: 4px; }
  .scene-btn {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    color: white; padding: 6px 16px; border-radius: 20px;
    cursor: pointer; font-family: inherit; font-size: 13px;
    white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
  }
  .scene-btn:hover  { background: rgba(255,105,180,0.2); border-color: #ff69b480; }
  .scene-btn.active { background: #ff69b4; border-color: #ff69b4; font-weight: bold; }

  /* ── Main Layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 92px; background: rgba(0,0,0,0.45);
    border-right: 1px solid rgba(255,255,255,0.07);
    padding: 12px 8px; display: flex; flex-direction: column;
    gap: 10px; overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-label {
    font-size: 10px; color: #7050a0; text-align: center;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .tool-group { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .tool-btn {
    width: 56px; height: 52px;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.14);
    border-radius: 14px; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px; color: white;
    margin: 0 auto; transition: all 0.15s; font-family: inherit;
  }
  .tool-btn .icon { font-size: 22px; line-height: 1; }
  .tool-btn .label { font-size: 9px; color: #a080c0; }
  .tool-btn:hover  { background: rgba(255,105,180,0.18); border-color: #ff69b460; }
  .tool-btn.active { background: rgba(255,105,180,0.32); border-color: #ff69b4; }

  /* Brush sizes */
  .size-group { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .size-ring {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2); cursor: pointer;
    transition: border-color 0.15s;
  }
  .size-ring:hover  { border-color: rgba(255,105,180,0.6); }
  .size-ring.active { border-color: #ff69b4; }
  .size-dot { border-radius: 50%; background: white; }

  /* Color swatches */
  .current-color-wrap { text-align: center; }
  .current-color {
    width: 46px; height: 46px; border-radius: 50%;
    margin: 0 auto 3px;
    border: 3px solid rgba(255,255,255,0.35);
    box-shadow: 0 0 14px rgba(0,0,0,0.5);
  }
  .current-color-label { font-size: 9px; color: #7050a0; }

  .palette { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .swatch {
    width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.15);
    transition: transform 0.1s, border-color 0.1s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .swatch:hover  { transform: scale(1.18); }
  .swatch.active { border-color: white; transform: scale(1.18); box-shadow: 0 0 0 2px #ff69b4, 0 2px 6px rgba(0,0,0,0.4); }

  /* Actions */
  .action-group { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .action-btn {
    width: 56px; padding: 7px 4px;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.14);
    border-radius: 12px; cursor: pointer;
    font-family: inherit; color: white; font-size: 10px;
    text-align: center; display: block; line-height: 1.5;
    transition: all 0.15s;
  }
  .action-btn .icon { font-size: 18px; display: block; }
  .action-btn:hover { background: rgba(255,255,255,0.14); }
  .action-btn.red:hover { background: rgba(255,60,60,0.22); border-color: rgba(255,60,60,0.7); }

  /* ── Canvas Area ── */
  .canvas-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 18px;
    background: radial-gradient(ellipse at center, #1a0838 0%, #0d0621 100%);
    overflow: hidden;
  }

  /* The "page" — white paper feel */
  .page-wrap {
    position: relative;
    border-radius: 12px;
    box-shadow:
      0 0 0 3px rgba(255,105,180,0.25),
      0 0 40px rgba(255,105,180,0.15),
      0 12px 40px rgba(0,0,0,0.6),
      4px 4px 0 rgba(0,0,0,0.3);
    cursor: crosshair;
    background: white;  /* The page background */
  }

  /* Color canvas sits on the white page */
  #colorCanvas {
    display: block;
    position: relative;
    z-index: 1;
    cursor: crosshair;
    /* transparent — white page shows through */
  }

  /* SVG line art sits on TOP of colours — multiply blend = white→transparent, black→black */
  #lineArt {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
    mix-blend-mode: multiply;
    display: block;
  }

  /* hidden outline canvas for flood-fill boundary detection */
  #outlineCanvas { display: none; }

  /* Loading indicator */
  .loading {
    position: absolute; inset: 0; z-index: 10;
    display: none; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.7); border-radius: 12px;
    font-size: 28px; color: #9070b0;
  }
  .loading.show { display: flex; }

  /* Save toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #28a745; color: white;
    padding: 12px 26px; border-radius: 50px; font-size: 15px;
    opacity: 0; pointer-events: none; z-index: 100;
    transition: opacity 0.3s, transform 0.3s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">← Home</a>
  <h1>🎨 Coloring Book</h1>
</div>

<div class="scene-bar">
  <span>Pick a picture:</span>
  <button class="scene-btn active" onclick="loadScene(0, this)">🌟 Star</button>
  <button class="scene-btn" onclick="loadScene(1, this)">🐱 Cat</button>
  <button class="scene-btn" onclick="loadScene(2, this)">🦋 Butterfly</button>
  <button class="scene-btn" onclick="loadScene(3, this)">🌻 Flower</button>
  <button class="scene-btn" onclick="loadScene(4, this)">🏠 House</button>
</div>

<div class="main">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-label">Tool</div>
    <div class="tool-group">
      <button class="tool-btn active" id="tool-brush" onclick="setTool('brush')">
        <span class="icon">✏️</span><span class="label">Draw</span>
      </button>
      <button class="tool-btn" id="tool-fill" onclick="setTool('fill')">
        <span class="icon">🪣</span><span class="label">Fill</span>
      </button>
      <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">
        <span class="icon">🧹</span><span class="label">Erase</span>
      </button>
    </div>

    <div class="sidebar-label">Size</div>
    <div class="size-group">
      <div class="size-ring active" data-s="4"  onclick="setSize(4,this)">
        <div class="size-dot" style="width:6px;height:6px;"></div>
      </div>
      <div class="size-ring" data-s="11" onclick="setSize(11,this)">
        <div class="size-dot" style="width:13px;height:13px;"></div>
      </div>
      <div class="size-ring" data-s="22" onclick="setSize(22,this)">
        <div class="size-dot" style="width:22px;height:22px;"></div>
      </div>
    </div>

    <div class="sidebar-label">Color</div>
    <div class="current-color-wrap">
      <div class="current-color" id="currentColorDot"></div>
      <div class="current-color-label">Selected</div>
    </div>
    <div class="palette" id="palette"></div>

    <div class="sidebar-label">Actions</div>
    <div class="action-group">
      <button class="action-btn" onclick="saveImage()">
        <span class="icon">💾</span>Save
      </button>
      <button class="action-btn red" onclick="clearColors()">
        <span class="icon">🗑️</span>Clear
      </button>
    </div>
  </div>

  <!-- Canvas Area -->
  <div class="canvas-area">
    <div class="page-wrap" id="pageWrap">
      <!-- User draws colors here -->
      <canvas id="colorCanvas" width="560" height="460"></canvas>
      <!-- SVG line art overlay — black lines show over the colors -->
      <img id="lineArt" alt="line art"/>
      <!-- Hidden: used only for flood-fill boundary detection -->
      <canvas id="outlineCanvas" width="560" height="460"></canvas>
      <!-- Loading indicator -->
      <div class="loading" id="loading">⏳</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ Saved to Downloads!</div>

<script>
// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const CW = 560, CH = 460;
const colorCanvas   = document.getElementById('colorCanvas');
const outlineCanvas = document.getElementById('outlineCanvas');
const lineArtImg    = document.getElementById('lineArt');
const colorCtx      = colorCanvas.getContext('2d', { willReadFrequently: true });
const outlineCtx    = outlineCanvas.getContext('2d', { willReadFrequently: true });

colorCanvas.style.width  = CW + 'px';
colorCanvas.style.height = CH + 'px';
document.getElementById('pageWrap').style.width  = CW + 'px';
document.getElementById('pageWrap').style.height = CH + 'px';

// ─── STATE ────────────────────────────────────────────────────────────────────
let tool        = 'brush';
let brushSize   = 4;
let curColor    = [255, 200, 0]; // default gold
let painting    = false;
let lastX = 0, lastY = 0;

// ─── PALETTE ─────────────────────────────────────────────────────────────────
const COLORS = [
  [255, 80,  80 ], [255,160,  50], [255,215,  0 ], [140,210,  70],
  [50, 190, 100 ], [40, 200, 220], [50, 120, 255], [150, 80, 255],
  [240, 80, 200 ], [255,150, 180], [255,220, 150], [180,230, 255],
  [255,255, 255 ], [200,200, 200], [120, 80,  40], [30,  20,  60],
  [255,140,   0 ], [0,  170, 130], [200, 0,  100], [80, 160, 255],
];

const palette = document.getElementById('palette');
COLORS.forEach((c, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i === 2 ? ' active' : '');
  sw.style.background = `rgb(${c[0]},${c[1]},${c[2]})`;
  sw.onclick = () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    curColor = c;
    updateColorDot();
    if (tool === 'eraser') setTool('brush');
  };
  palette.appendChild(sw);
});

function updateColorDot() {
  document.getElementById('currentColorDot').style.background =
    `rgb(${curColor[0]},${curColor[1]},${curColor[2]})`;
}
updateColorDot();

// ─── TOOLS ────────────────────────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + t).classList.add('active');
  colorCanvas.style.cursor = t === 'fill' ? 'cell' : 'crosshair';
}

function setSize(s, el) {
  brushSize = s;
  document.querySelectorAll('.size-ring').forEach(r => r.classList.remove('active'));
  el.classList.add('active');
}

// ─── POINTER HELPERS ─────────────────────────────────────────────────────────
function getPos(e) {
  const rect = colorCanvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return [
    Math.round((src.clientX - rect.left) * (CW / rect.width)),
    Math.round((src.clientY - rect.top)  * (CH / rect.height))
  ];
}

// ─── DRAW (brush/eraser) ─────────────────────────────────────────────────────
function drawLine(x1, y1, x2, y2) {
  colorCtx.lineCap  = 'round';
  colorCtx.lineJoin = 'round';

  if (tool === 'eraser') {
    colorCtx.globalCompositeOperation = 'destination-out';
    colorCtx.strokeStyle = 'rgba(0,0,0,1)';
    colorCtx.lineWidth   = brushSize * 3.5;
  } else {
    colorCtx.globalCompositeOperation = 'source-over';
    colorCtx.strokeStyle = `rgb(${curColor[0]},${curColor[1]},${curColor[2]})`;
    colorCtx.lineWidth   = brushSize * 2;
  }
  colorCtx.beginPath();
  colorCtx.moveTo(x1, y1);
  colorCtx.lineTo(x2, y2);
  colorCtx.stroke();
  colorCtx.globalCompositeOperation = 'source-over';
}

// Mouse events
colorCanvas.addEventListener('mousedown', e => {
  const [x, y] = getPos(e);
  if (tool === 'fill') { floodFill(x, y); return; }
  painting = true; lastX = x; lastY = y;
  drawLine(x, y, x, y);
});
colorCanvas.addEventListener('mousemove', e => {
  if (!painting) return;
  const [x, y] = getPos(e);
  drawLine(lastX, lastY, x, y);
  lastX = x; lastY = y;
});
colorCanvas.addEventListener('mouseup',    () => { painting = false; });
colorCanvas.addEventListener('mouseleave', () => { painting = false; });

// Touch events
colorCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const [x, y] = getPos(e);
  if (tool === 'fill') { floodFill(x, y); return; }
  painting = true; lastX = x; lastY = y;
  drawLine(x, y, x, y);
}, { passive: false });
colorCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!painting) return;
  const [x, y] = getPos(e);
  drawLine(lastX, lastY, x, y);
  lastX = x; lastY = y;
}, { passive: false });
colorCanvas.addEventListener('touchend', () => { painting = false; });

// ─── FLOOD FILL ───────────────────────────────────────────────────────────────
// outlineCanvas has the SVG rendered (white bg + dark strokes).
// We treat dark pixels as boundaries.

function isBoundary(r, g, b, a) {
  // A "line" pixel: has good opacity and is dark
  return a > 120 && (r + g + b) < 180;
}

function floodFill(x0, y0) {
  x0 = Math.max(0, Math.min(CW - 1, x0));
  y0 = Math.max(0, Math.min(CH - 1, y0));

  const outData  = outlineCtx.getImageData(0, 0, CW, CH).data;
  const imgData  = colorCtx.getImageData(0, 0, CW, CH);
  const data     = imgData.data;

  const oi = (y0 * CW + x0) * 4;
  // Don't fill if we clicked directly on a boundary stroke
  if (isBoundary(outData[oi], outData[oi+1], outData[oi+2], outData[oi+3])) return;

  // Target color on colorCanvas at clicked pixel
  const ci = oi;
  const tR = data[ci], tG = data[ci+1], tB = data[ci+2], tA = data[ci+3];
  const [fR, fG, fB] = curColor;

  // Already the fill color
  if (tA > 200 && tR === fR && tG === fG && tB === fB) return;

  const visited = new Uint8Array(CW * CH);
  const stack   = [(y0 * CW + x0)];

  while (stack.length) {
    const i = stack.pop();
    if (visited[i]) continue;
    visited[i] = 1;

    const p = i * 4;

    // Stop at outline boundaries
    if (isBoundary(outData[p], outData[p+1], outData[p+2], outData[p+3])) continue;

    // Color match on colorCanvas: accept transparent pixels OR pixels close to target
    const cA = data[p + 3];
    if (cA > 30) {
      const dr = data[p] - tR, dg = data[p+1] - tG, db = data[p+2] - tB;
      if (dr*dr + dg*dg + db*db > 55*55*3) continue;
    }

    data[p]   = fR;
    data[p+1] = fG;
    data[p+2] = fB;
    data[p+3] = 220; // slightly transparent so line art multiply layer blends in

    const x = i % CW, y = (i / CW) | 0;
    if (x > 0)      stack.push(i - 1);
    if (x < CW - 1) stack.push(i + 1);
    if (y > 0)      stack.push(i - CW);
    if (y < CH - 1) stack.push(i + CW);
  }

  colorCtx.putImageData(imgData, 0, 0);
}

// ─── CLEAR & SAVE ─────────────────────────────────────────────────────────────
function clearColors() {
  colorCtx.clearRect(0, 0, CW, CH);
}

function saveImage() {
  const merged = document.createElement('canvas');
  merged.width = CW; merged.height = CH;
  const mCtx = merged.getContext('2d');
  mCtx.fillStyle = 'white';
  mCtx.fillRect(0, 0, CW, CH);
  mCtx.drawImage(colorCanvas, 0, 0);
  mCtx.drawImage(outlineCanvas, 0, 0);

  const a = document.createElement('a');
  a.download = 'my-coloring.png';
  a.href = merged.toDataURL();
  a.click();

  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── SVG SCENES ───────────────────────────────────────────────────────────────
// Each SVG: white background + black strokes only (no colored fills)
// mix-blend-mode:multiply on the <img> makes white transparent → lines show over colors
const W = 560, H = 460;

const scenes = [

// ── 0: HAPPY STAR ─────────────────────────────────────────────────────────────
`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 460">
  <rect width="560" height="460" fill="white"/>

  <!-- big star body -->
  <polygon points="280,58 318,174 432,174 340,244 373,360 280,290 187,360 220,244 128,174 242,174"
    fill="white" stroke="#1a1030" stroke-width="6" stroke-linejoin="round"/>

  <!-- left eye outer -->
  <circle cx="246" cy="200" r="22" fill="white" stroke="#1a1030" stroke-width="4.5"/>
  <!-- left pupil -->
  <circle cx="246" cy="200" r="10" fill="white" stroke="#1a1030" stroke-width="3.5"/>
  <!-- left eye shine -->
  <circle cx="240" cy="194" r="4" fill="white" stroke="#1a1030" stroke-width="2"/>

  <!-- right eye outer -->
  <circle cx="314" cy="200" r="22" fill="white" stroke="#1a1030" stroke-width="4.5"/>
  <!-- right pupil -->
  <circle cx="314" cy="200" r="10" fill="white" stroke="#1a1030" stroke-width="3.5"/>
  <!-- right eye shine -->
  <circle cx="308" cy="194" r="4" fill="white" stroke="#1a1030" stroke-width="2"/>

  <!-- smile -->
  <path d="M 251 232 Q 280 262 309 232"
    fill="none" stroke="#1a1030" stroke-width="4.5" stroke-linecap="round"/>

  <!-- cheeks (dashed oval) -->
  <ellipse cx="220" cy="224" rx="18" ry="11"
    fill="none" stroke="#1a1030" stroke-width="2.5" stroke-dasharray="4,4"/>
  <ellipse cx="340" cy="224" rx="18" ry="11"
    fill="none" stroke="#1a1030" stroke-width="2.5" stroke-dasharray="4,4"/>

  <!-- decorative mini stars at corners -->
  <!-- top-left -->
  <polygon points="72,56 78,74 96,74 82,85 87,103 72,92 57,103 62,85 48,74 66,74"
    fill="white" stroke="#1a1030" stroke-width="3" stroke-linejoin="round"/>
  <!-- top-right -->
  <polygon points="488,56 494,74 512,74 498,85 503,103 488,92 473,103 478,85 464,74 482,74"
    fill="white" stroke="#1a1030" stroke-width="3" stroke-linejoin="round"/>
  <!-- bottom-left -->
  <polygon points="72,370 78,388 96,388 82,399 87,417 72,406 57,417 62,399 48,388 66,388"
    fill="white" stroke="#1a1030" stroke-width="3" stroke-linejoin="round"/>
  <!-- bottom-right -->
  <polygon points="488,370 494,388 512,388 498,399 503,417 488,406 473,417 478,399 464,388 482,388"
    fill="white" stroke="#1a1030" stroke-width="3" stroke-linejoin="round"/>
  <!-- top-center sparkle -->
  <line x1="280" y1="22" x2="280" y2="38" stroke="#1a1030" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="272" y1="26" x2="288" y2="34" stroke="#1a1030" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="272" y1="34" x2="288" y2="26" stroke="#1a1030" stroke-width="2.5" stroke-linecap="round"/>

  <!-- swirly clouds bottom -->
  <path d="M 60 420 Q 80 402 100 416 Q 116 402 136 416 Q 152 402 168 416"
    fill="none" stroke="#1a1030" stroke-width="3" stroke-linecap="round"/>
  <path d="M 392 420 Q 412 402 432 416 Q 448 402 468 416 Q 484 402 500 416"
    fill="none" stroke="#1a1030" stroke-width="3" stroke-linecap="round"/>
</svg>`,

// ── 1: CAT ────────────────────────────────────────────────────────────────────
`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 460">
  <rect width="560" height="460" fill="white"/>

  <!-- body -->
  <ellipse cx="280" cy="320" rx="105" ry="115"
    fill="white" stroke="#1a1030" stroke-width="5.5"/>

  <!-- head -->
  <circle cx="280" cy="175" r="96"
    fill="white" stroke="#1a1030" stroke-width="5.5"/>

  <!-- left ear -->
  <polygon points="168,114 192,52 238,108"
    fill="white" stroke="#1a1030" stroke-width="5" stroke-linejoin="round"/>
  <!-- left inner ear -->
  <polygon points="180,110 198,66 226,110"
    fill="white" stroke="#1a1030" stroke-width="3" stroke-linejoin="round"/>

  <!-- right ear -->
  <polygon points="392,114 368,52 322,108"
    fill="white" stroke="#1a1030" stroke-width="5" stroke-linejoin="round"/>

// ─── SCENE LOADING ────────────────────────────────────────────────────────────
function loadScene(idx, btn) {
  // Update active button
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  // Clear user colors
  colorCtx.clearRect(0, 0, CW, CH);

  const loading = document.getElementById('loading');
  loading.classList.add('show');

  const svgBlob = new Blob([scenes[idx]], { type: 'image/svg+xml;charset=utf-8' });
  const url     = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    // 1. Render to hidden outlineCanvas (used for flood-fill boundary detection)
    outlineCtx.clearRect(0, 0, CW, CH);
    outlineCtx.drawImage(img, 0, 0, CW, CH);

    // 2. Set visible overlay (mix-blend-mode:multiply makes white→transparent)
    lineArtImg.src = url;
    lineArtImg.onload = () => URL.revokeObjectURL(url);

    loading.classList.remove('show');
  };
  img.onerror = () => { loading.classList.remove('show'); };
  img.src = url;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadScene(0, document.querySelector('.scene-btn.active'));
</script>
